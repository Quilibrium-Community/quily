name: Daily Docs Sync & RAG Ingestion

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync-and-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check for documentation changes
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(yarn sync-docs status 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "unchanged"; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync docs and run ingestion
        if: steps.check.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHUTES_API_KEY: ${{ secrets.CHUTES_API_KEY }}
        run: yarn sync-docs sync --ingest

      - name: Commit synced docs and manifest
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add docs/quilibrium-official/
          git diff --staged --quiet || git commit -m "docs: sync Quilibrium documentation (automated daily)"
          git push

      - name: Supabase keepalive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          API="${SUPABASE_URL}/rest/v1"
          AUTH=(-H "apikey: ${SUPABASE_SERVICE_KEY}" -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # 1. Read: count RAG chunks
          curl -sf "${API}/document_chunks_chutes?select=id&limit=1" \
            "${AUTH[@]}" -H "Prefer: count=exact" -o /dev/null
          echo "1/10 — RAG chunk count query"

          # 2. Read: fetch latest chunk metadata
          curl -sf "${API}/document_chunks_chutes?select=id,source_file,created_at&order=created_at.desc&limit=3" \
            "${AUTH[@]}" -o /dev/null
          echo "2/10 — Latest chunks query"

          # 3. Read: distinct doc types
          curl -sf "${API}/document_chunks_chutes?select=doc_type&limit=10" \
            "${AUTH[@]}" -o /dev/null
          echo "3/10 — Doc types query"

          # 4. Read: distinct source files sample
          curl -sf "${API}/document_chunks_chutes?select=source_file&limit=5&order=source_file" \
            "${AUTH[@]}" -o /dev/null
          echo "4/10 — Source files query"

          # 5. Write: upsert keepalive row 1 (current ping)
          curl -sf "${API}/keepalive_pings" \
            "${AUTH[@]}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"id\": 1, \"pinged_at\": \"${NOW}\", \"source\": \"github-actions\"}" \
            -o /dev/null
          echo "5/10 — Keepalive row 1 upserted"

          # 6. Write: upsert keepalive row 2 (streak counter)
          curl -sf "${API}/keepalive_pings" \
            "${AUTH[@]}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"id\": 2, \"pinged_at\": \"${NOW}\", \"source\": \"streak\"}" \
            -o /dev/null
          echo "6/10 — Keepalive row 2 upserted"

          # 7. Read: verify row 1
          curl -sf "${API}/keepalive_pings?id=eq.1&select=pinged_at,source" \
            "${AUTH[@]}" -o /dev/null
          echo "7/10 — Row 1 read-back"

          # 8. Read: verify row 2
          curl -sf "${API}/keepalive_pings?id=eq.2&select=pinged_at,source" \
            "${AUTH[@]}" -o /dev/null
          echo "8/10 — Row 2 read-back"

          # 9. Read: fetch all keepalive rows
          curl -sf "${API}/keepalive_pings?select=*&order=id" \
            "${AUTH[@]}" -o /dev/null
          echo "9/10 — Full keepalive table read"

          # 10. Read: search RAG chunks by recent date
          curl -sf "${API}/document_chunks_chutes?select=id,title&order=created_at.desc&limit=1&offset=0" \
            "${AUTH[@]}" -o /dev/null
          echo "10/10 — Recent RAG entry query"

          echo "Keepalive complete: 10 operations at ${NOW}"

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_changes }}" == "true" ]; then
            echo "✅ Documentation synced and RAG updated"
          else
            echo "✅ No changes detected — documentation is up to date"
          fi
